name: waheed
description: "A new Flutter project for men's suits."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  
  # Localization packages for Arabic support
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.10

  #Animation
  animate_do: ^5.1.0
  lottie: ^3.3.2



  # State Management
  flutter_bloc: ^8.1.3

  # Networking
  dio: ^5.4.3

  # Local Storage
  shared_preferences: ^2.2.3
  pin_code_fields: ^9.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets configuration
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Bold.ttf
          weight: 700